name: Codex autofix

# Opt-in, maintainer-triggered. Codex makes a change and opens a PR with it; the new
# PR is then validated by CI + the Codex review workflow (humans still merge).
# Trigger either by running the workflow manually, or by commenting on an issue/PR:
#   /codex-fix <what to change>
# Requires repo secret OPENAI_API_KEY.

on:
  workflow_dispatch:
    inputs:
      task:
        description: What should Codex fix or implement?
        required: true
  issue_comment:
    types: [created]

permissions:
  contents: read

jobs:
  autofix:
    # Manual dispatch, OR a "/codex-fix" comment from someone with write access.
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' &&
       startsWith(github.event.comment.body, '/codex-fix') &&
       contains(fromJson('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v5
        # persist-credentials (default true) so we can push the fix branch.

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Resolve task text
        id: task
        env:
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_TASK: ${{ github.event.inputs.task }}
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            TASK="$DISPATCH_TASK"
          else
            # Strip the leading "/codex-fix" command token.
            TASK="${COMMENT_BODY#/codex-fix}"
            TASK="${TASK# }"
          fi
          {
            echo "value<<__OHANA_EOF__"
            printf '%s\n' "$TASK"
            echo "__OHANA_EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Run Codex (writes changes)
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          sandbox: workspace-write
          prompt: |
            Read AGENTS.md for project context and conventions before changing anything.

            Task:
            ${{ steps.task.outputs.value }}

            Make the minimal change needed. Keep to the project's style and the
            architecture boundaries in AGENTS.md. Add or update a colocated *.test.ts when
            you change behavior, and update CHANGELOG.md (Unreleased) for user-facing
            changes. Do NOT commit — leave the edited files in the working tree; a later
            step opens the PR. CI on the resulting PR will run the full build and tests.

      - name: Open a PR with the changes
        env:
          GH_TOKEN: ${{ github.token }}
          TASK: ${{ steps.task.outputs.value }}
          RUN_ID: ${{ github.run_id }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail
          if [ -z "$(git status --porcelain)" ]; then
            echo "Codex produced no changes — nothing to open."
            exit 0
          fi
          BRANCH="codex/fix-${RUN_ID}"
          git config user.name "codex-autofix[bot]"
          git config user.email "codex-autofix@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "Codex autofix (run ${RUN_ID})"
          git push origin "$BRANCH"
          {
            echo "Automated change generated by the Codex autofix workflow."
            echo
            echo "**Requested task:**"
            echo
            printf '%s\n' "$TASK"
            echo
            echo "_Review carefully — this was generated by Codex and is validated by CI on this PR._"
          } > /tmp/pr-body.md
          gh pr create --head "$BRANCH" --base "$DEFAULT_BRANCH" \
            --title "Codex autofix (run ${RUN_ID})" \
            --body-file /tmp/pr-body.md
